<div class="field" [class.field--error]="error()">
  @if (label()) {
    <label class="field__label" [for]="id()">{{ label() }}</label>
  }
  <div class="field__control">
    <input
      [id]="id()"
      class="field__input"
      [type]="effectiveType()"
      [value]="value()"
      [placeholder]="placeholder()"
      [autocomplete]="autocomplete()"
      [inputMode]="inputMode()"
      [attr.maxlength]="maxLength()"
      [attr.minlength]="minLength()"
      [attr.min]="min()"
      [attr.max]="max()"
      [attr.step]="step()"
      [disabled]="effectiveDisabled()"
      [readOnly]="readonly()"
      [required]="required()"
      [attr.aria-required]="required() ? 'true' : null"
      [attr.aria-invalid]="!!error()"
      [attr.aria-describedby]="error() ? id() + '-error' : hint() ? id() + '-hint' : null"
      (input)="handleInput($event)"
      (blur)="handleBlur()"
    />
    @if (type() === 'password' && revealable()) {
      <button
        class="field__reveal"
        type="button"
        [disabled]="effectiveDisabled()"
        [attr.aria-label]="revealed() ? 'Ocultar contraseña' : 'Mostrar contraseña'"
        (click)="toggleReveal()"
      >
        {{ revealed() ? 'Ocultar' : 'Mostrar' }}
      </button>
    }
  </div>
  @if (error()) {
    <span class="field__message field__message--error" [id]="id() + '-error'">{{ error() }}</span>
  } @else if (hint()) {
    <span class="field__message" [id]="id() + '-hint'">{{ hint() }}</span>
  }
</div>
