<div class="actions-container">
  <button
    type="button"
    class="action-btn view"
    [title]="'table.actions.view' | translate"
    [attr.aria-label]="'table.actions.view' | translate"
    (click)="view.emit()"
  >
    <i class="fa-solid fa-eye"></i>
  </button>
  <button
    type="button"
    class="action-btn edit"
    [title]="'table.actions.edit' | translate"
    [attr.aria-label]="'table.actions.edit' | translate"
    (click)="edit.emit()"
  >
    <i class="fa-solid fa-pencil"></i>
  </button>
  <button
    type="button"
    class="action-btn delete"
    [title]="'table.actions.delete' | translate"
    [attr.aria-label]="'table.actions.delete' | translate"
    (click)="delete.emit()"
  >
    <i class="fa-solid fa-trash-can"></i>
  </button>
</div>
